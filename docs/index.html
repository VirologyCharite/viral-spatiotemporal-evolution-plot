    <div>                        <script>window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.5.0.min.js" integrity="sha256-fHbNLP+GlIXN+efbQec78UkemUz3NJp7UmfGxC1tNxs=" crossorigin="anonymous"></script>                <div id="4ca9f6b3-466d-4813-80ec-d10141255f44" class="plotly-graph-div" style="height:620px; width:960px;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("4ca9f6b3-466d-4813-80ec-d10141255f44")) {                    Plotly.newPlot(                        "4ca9f6b3-466d-4813-80ec-d10141255f44",                        [{"customdata":["\u003cb\u003eRdRp nucleotide misincorporation\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eAn RdRp incorporates the wrong nucleotide once every\u003cbr\u003e~10 s of copying — the fastest evolutionary event in\u003cbr\u003evirology, and the raw material of all RNA virus\u003cbr\u003ediversity.","\u003cb\u003eRibosomal frameshifting\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eProgrammed −1 ribosomal frameshifting (HIV,\u003cbr\u003ecoronaviruses) occurs in milliseconds, generating\u003cbr\u003emultiple proteins from one genome — a single molecular\u003cbr\u003eevent with profound functional consequences.","\u003cb\u003eCapsid self-assembly\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eViral coat proteins assemble around the genome in\u003cbr\u003eminutes, driven by thermodynamics alone — no enzymatic\u003cbr\u003eenergy required. One of biology's most elegant examples\u003cbr\u003eof self-organisation.","\u003cb\u003eAPOBEC3 deamination of retroviral genome\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eHost APOBEC3 hypermutates the retroviral genome during\u003cbr\u003ereverse transcription. Its molecular signatures remain\u003cbr\u003ereadable in ERV sequences tens of millions of years\u003cbr\u003elater — the arms race fossilised at the molecular\u003cbr\u003escale.","\u003cb\u003eViral membrane budding\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eEnveloped viruses bud from the plasma membrane in\u003cbr\u003eminutes, hijacking host ESCRT machinery — the moment a\u003cbr\u003enew virion first becomes physically independent of its\u003cbr\u003ehost cell."],"hovertemplate":"%{customdata}\u003cextra\u003e\u003c\u002fextra\u003e","marker":{"color":"#3B82F6","line":{"color":"white","width":1.5},"opacity":0.85,"size":12},"mode":"markers","name":"Molecular \u002f subcellular","x":[-3.0,-1.5,2.5,3.2,2.0],"y":[-8.2,-7.4,-7.0,-8.0,-6.0],"type":"scatter"},{"customdata":["\u003cb\u003ePhage replication cycle (~25 min)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eBacteriophage T4 completes a full lytic cycle in ~25\u003cbr\u003eminutes. In a single day, a phage population undergoes\u003cbr\u003emore generations than mammals have completed in 100\u003cbr\u003emillion years.","\u003cb\u003eInfluenza replication cycle (~8 hr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eInfluenza completes one replication cycle in ~8 hr\u003cbr\u003ewithin a respiratory epithelial cell, generating\u003cbr\u003ehundreds of progeny — most defective, some carrying\u003cbr\u003enovel mutations that may prove advantageous.","\u003cb\u003eHIV replication cycle (~2 days)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eHIV replicates with a ~2-day cycle; ~10¹⁰ virions\u003cbr\u003eproduced daily in untreated infection. Each generation\u003cbr\u003eis another round of mutation and selection — evolution\u003cbr\u003eat the speed of disease.","\u003cb\u003eHIV quasispecies turnover (weeks)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eThe entire circulating HIV quasispecies in a patient\u003cbr\u003eturns over multiple times per week — a complete\u003cbr\u003eevolving ecosystem in miniature, observable in real\u003cbr\u003etime.","\u003cb\u003eDrug resistance emergence (weeks–months)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eResistance mutations pre-existing at 1-in-10⁵ frequency\u003cbr\u003ecan fix within weeks of starting monotherapy. Selection\u003cbr\u003eis extreme — non-resistant virus is effectively dead.\u003cbr\u003eThis is why combination therapy is required.","\u003cb\u003eChronic within-host immune escape (years)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eOver years of chronic HIV infection, escape mutations\u003cbr\u003eaccumulate across the full CTL repertoire — a complete\u003cbr\u003eevolutionary trajectory observable within a single\u003cbr\u003epatient's clinical records."],"hovertemplate":"%{customdata}\u003cextra\u003e\u003c\u002fextra\u003e","marker":{"color":"#10B981","line":{"color":"white","width":1.5},"opacity":0.85,"size":12},"mode":"markers","name":"Within-host evolution","x":[3.0,3.6,4.9,6.2,7.1,8.3],"y":[-5.5,-4.0,-2.5,0.3,-0.3,-0.5],"type":"scatter"},{"customdata":["\u003cb\u003eOceanic viral shunt (daily, planetary)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eViral lysis of marine bacteria diverts ~25% of ocean\u003cbr\u003eprimary production daily — the same replication process\u003cbr\u003ethat causes disease, simultaneously operating as a\u003cbr\u003eplanetary biogeochemical cycle. Note: same timescale as\u003cbr\u003ethe HIV replication cycle, 17 orders of magnitude\u003cbr\u003ehigher in spatial scale.","\u003cb\u003eSARS-CoV-2 variant emergence (months)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eOmicron acquired \u003e30 spike mutations in months —\u003cbr\u003eprobably in a single immunocompromised host — then\u003cbr\u003espread globally. Within-host evolution projecting\u003cbr\u003edirectly onto pandemic scale.","\u003cb\u003eSeasonal influenza antigenic drift\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eHA\u002fNA accumulate mutations under antibody pressure over\u003cbr\u003e1–2 years — enough to require annual vaccine\u003cbr\u003ereformulation globally. Influenza's evolutionary clock\u003cbr\u003eis calibrated on vaccine committee meetings.","\u003cb\u003eSARS-CoV-1 epidemic (2002–03)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003e~8,000 cases, contained in months — but the first\u003cbr\u003edemonstration that bat coronaviruses could cause severe\u003cbr\u003ehuman disease. The evolutionary warning shot before\u003cbr\u003eSARS-CoV-2.","\u003cb\u003e1918 influenza pandemic\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eA reassortment event producing a novel HA swept the\u003cbr\u003eglobe in ~2 years, killing up to 100 million people.\u003cbr\u003eThe virus was later reconstructed from permafrost and\u003cbr\u003earchival lung tissue decades after the pandemic.","\u003cb\u003eHIV pandemic origin (~1920, century scale)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eOne spillover of SIVcpz into humans in Kinshasa ~1920\u003cbr\u003ebecame a global pandemic of 85 million infections over\u003cbr\u003ea century — the slowest pandemic build-up in the modern\u003cbr\u003evirological record."],"hovertemplate":"%{customdata}\u003cextra\u003e\u003c\u002fextra\u003e","marker":{"color":"#F59E0B","line":{"color":"white","width":1.5},"opacity":0.85,"size":12},"mode":"markers","name":"Population \u002f epidemic","x":[4.9,6.8,7.5,7.3,8.0,9.5],"y":[7.8,7.3,7.1,6.8,7.5,7.4],"type":"scatter"},{"customdata":["\u003cb\u003ePithovirus revived from permafrost (30,000 yr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eA 30,000-yr-old giant virus revived from Siberian\u003cbr\u003epermafrost and found to be still infectious. As Arctic\u003cbr\u003epermafrost thaws under climate change, ancient viral\u003cbr\u003elineages absent for millennia may re-emerge.","\u003cb\u003eHBV in Neolithic remains (7,000 yr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eHepatitis B virus sequences recovered from 7,000-yr-old\u003cbr\u003eskeletal remains across Eurasia — tracing ancient viral\u003cbr\u003ephylogeography alongside human migration since the\u003cbr\u003eNeolithic. Viruses as markers of human history.","\u003cb\u003eSIV co-evolution with African primates (Myr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eSIV has co-evolved with dozens of African primate\u003cbr\u003especies for millions of years. HIV-1 is an extremely\u003cbr\u003erecent spillover on this timescale — a momentary\u003cbr\u003eperturbation in a much older relationship.","\u003cb\u003eTRIM5α\u002fCypA fusion in owl monkeys (~5 Myr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eA LINE-1 retrotransposition event fused CypA to TRIM5α\u003cbr\u003ein owl monkey ancestors ~5 Mya, creating a novel\u003cbr\u003erestriction factor against an ancient lentivirus — a\u003cbr\u003epermanent genetic scar of the host-virus arms race.","\u003cb\u003eHERV integrations \u002f syncytin co-option (~50 Myr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eMost HERVs integrated during mammalian radiation.\u003cbr\u003eRetroviral env genes were independently co-opted for\u003cbr\u003eplacentation in multiple mammalian lineages — viruses\u003cbr\u003erepurposed as essential developmental machinery.","\u003cb\u003eMHC\u002fHLA diversification (~50 Myr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003ePathogen-driven balancing selection has maintained\u003cbr\u003eextraordinary HLA polymorphism for tens of millions of\u003cbr\u003eyears — the most polymorphic locus in the human genome,\u003cbr\u003eshaped almost entirely by pathogen pressure.","\u003cb\u003eHerpesvirus–vertebrate co-speciation (~400 Myr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eHerpesviruses co-diversified with vertebrates since the\u003cbr\u003eDevonian — approximately 400 million years of shared\u003cbr\u003eevolutionary history. Their phylogeny closely mirrors\u003cbr\u003ethat of their vertebrate hosts.","\u003cb\u003eRNA virus EVEs in vertebrates (~100+ Myr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eBornavirus- and filovirus-like endogenous elements push\u003cbr\u003ethese RNA virus lineages to \u003e100 Mya — far older than\u003cbr\u003eany direct sequence evidence suggested, revealed only\u003cbr\u003eby genomic paleovirology.","\u003cb\u003eJelly-roll capsid fold (pre-LUCA, ~4 Gyr)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eThis beta-barrel structural domain is shared across\u003cbr\u003eviruses infecting organisms from all three domains of\u003cbr\u003elife — implying a common viral ancestor predating LUCA.\u003cbr\u003ePossibly the oldest molecular fossil on Earth.","\u003cb\u003eRNA world replicators (~4 Gyr, local scale)\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eHypothetical pre-cellular RNA replicators in\u003cbr\u003ehydrothermal vents or tidal pools — ancestral to\u003cbr\u003eviroids, ribozymes, and viral RdRps. The starting point\u003cbr\u003eof the entire spectrum, operating at purely local\u003cbr\u003echemical scales before any cell existed."],"hovertemplate":"%{customdata}\u003cextra\u003e\u003c\u002fextra\u003e","marker":{"color":"#A855F7","line":{"color":"white","width":1.5},"opacity":0.85,"size":12},"mode":"markers","name":"Deep evolutionary time","x":[12.0,11.3,13.5,13.0,14.7,14.5,15.5,15.1,17.0,16.8],"y":[4.0,7.0,6.5,6.0,7.1,6.5,7.5,7.2,7.8,1.5],"type":"scatter"}],                        {"template":{"data":{"histogram2dcontour":[{"type":"histogram2dcontour","colorbar":{"outlinewidth":0,"ticks":""},"colorscale":[[0.0,"#0d0887"],[0.1111111111111111,"#46039f"],[0.2222222222222222,"#7201a8"],[0.3333333333333333,"#9c179e"],[0.4444444444444444,"#bd3786"],[0.5555555555555556,"#d8576b"],[0.6666666666666666,"#ed7953"],[0.7777777777777778,"#fb9f3a"],[0.8888888888888888,"#fdca26"],[1.0,"#f0f921"]]}],"choropleth":[{"type":"choropleth","colorbar":{"outlinewidth":0,"ticks":""}}],"histogram2d":[{"type":"histogram2d","colorbar":{"outlinewidth":0,"ticks":""},"colorscale":[[0.0,"#0d0887"],[0.1111111111111111,"#46039f"],[0.2222222222222222,"#7201a8"],[0.3333333333333333,"#9c179e"],[0.4444444444444444,"#bd3786"],[0.5555555555555556,"#d8576b"],[0.6666666666666666,"#ed7953"],[0.7777777777777778,"#fb9f3a"],[0.8888888888888888,"#fdca26"],[1.0,"#f0f921"]]}],"heatmap":[{"type":"heatmap","colorbar":{"outlinewidth":0,"ticks":""},"colorscale":[[0.0,"#0d0887"
